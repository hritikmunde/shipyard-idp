name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t ${{ values.serviceName }}:latest . || echo "No Dockerfile yet"
      
      - name: Run Tests
        run: echo "Add your test commands here"
      
      - name: Push to Registry
        if: github.ref == 'refs/heads/master'
        run: echo "Add your push commands here"